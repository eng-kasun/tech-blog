<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#242019"/>
      <stop offset="100%" stop-color="#1a1814"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#c49a6c"/>
      <stop offset="100%" stop-color="#b08550"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1814" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background (Apple style) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="111" fill="none" stroke="#3d3529" stroke-width="1.5"/>

  <!-- Subtle top glow -->
  <rect x="20" y="20" width="472" height="280" rx="96" fill="url(#glow)"/>

  <!-- Neural network constellation (subtle AI motif) -->
  <g stroke="#4a4238" stroke-width="1.2" opacity="0.35">
    <line x1="120" y1="130" x2="200" y2="190"/>
    <line x1="392" y1="130" x2="312" y2="190"/>
    <line x1="200" y1="190" x2="256" y2="160"/>
    <line x1="312" y1="190" x2="256" y2="160"/>
    <line x1="120" y1="382" x2="200" y2="322"/>
    <line x1="392" y1="382" x2="312" y2="322"/>
    <line x1="200" y1="322" x2="256" y2="352"/>
    <line x1="312" y1="322" x2="256" y2="352"/>
  </g>
  <g fill="#4a4238" opacity="0.35">
    <circle cx="120" cy="130" r="4"/>
    <circle cx="392" cy="130" r="4"/>
    <circle cx="200" cy="190" r="3.5"/>
    <circle cx="312" cy="190" r="3.5"/>
    <circle cx="256" cy="160" r="3"/>
    <circle cx="120" cy="382" r="4"/>
    <circle cx="392" cy="382" r="4"/>
    <circle cx="200" cy="322" r="3.5"/>
    <circle cx="312" cy="322" r="3.5"/>
    <circle cx="256" cy="352" r="3"/>
  </g>

  <!-- Central "T" letterform — elegant serif -->
  <g fill="url(#gold)">
    <!-- Horizontal crossbar -->
    <rect x="148" y="164" width="216" height="24" rx="3"/>
    <!-- Left serif -->
    <rect x="138" y="160" width="18" height="32" rx="3"/>
    <!-- Right serif -->
    <rect x="356" y="160" width="18" height="32" rx="3"/>
    <!-- Vertical stem -->
    <rect x="240" y="188" width="32" height="176" rx="3"/>
    <!-- Base crossbar -->
    <rect x="214" y="356" width="84" height="20" rx="3"/>
    <!-- Base left serif -->
    <rect x="206" y="352" width="16" height="28" rx="3"/>
    <!-- Base right serif -->
    <rect x="290" y="352" width="16" height="28" rx="3"/>
  </g>

  <!-- AI sparkle accents -->
  <g fill="#d4a574">
    <circle cx="378" cy="108" r="3" opacity="0.5"/>
    <circle cx="390" cy="118" r="1.8" opacity="0.35"/>
    <circle cx="134" cy="400" r="2.5" opacity="0.4"/>
    <circle cx="122" cy="410" r="1.5" opacity="0.25"/>
  </g>
</svg>
